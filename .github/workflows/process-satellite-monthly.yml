name: Process Monthly Satellite Data

# Runs on the 5th of each month (primary) and the 10th (retry for months with
# insufficient cloud-free scenes).  Can also be triggered manually via the
# GitHub UI with an optional period and force-reprocess flag.

on:
  schedule:
    # 05th of month at 22:00 UTC = 05:00 Bangkok (UTC+7)
    - cron: '0 22 5 * *'
    # 10th of month at 22:00 UTC – retry if previous month is still pending
    - cron: '0 22 10 * *'
  workflow_dispatch:
    inputs:
      period:
        description: 'Target period YYYY-MM (leave blank for previous month)'
        required: false
        default: ''
      force_reprocess:
        description: 'Force reprocess even if metadata already exists (true/false)'
        required: false
        default: 'false'

jobs:
  process:
    name: Compute monthly composite and upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/gee/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/gee/requirements.txt

      - name: Build run arguments
        id: args
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.period }}" ]; then
            ARGS="$ARGS --period ${{ github.event.inputs.period }}"
          fi
          if [ "${{ github.event.inputs.force_reprocess }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run monthly composite processing
        env:
          GEE_SERVICE_ACCOUNT_JSON: ${{ secrets.GEE_SERVICE_ACCOUNT_JSON }}
          R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:                ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:       ${{ secrets.R2_PUBLIC_BASE_URL }}
          SATELLITE_CACHE_PREFIX:   ${{ vars.SATELLITE_CACHE_PREFIX || 'satellite-cache' }}
          FORCE_REPROCESS:          ${{ github.event.inputs.force_reprocess || 'false' }}
        run: python scripts/gee/process-monthly.py ${{ steps.args.outputs.args }}
