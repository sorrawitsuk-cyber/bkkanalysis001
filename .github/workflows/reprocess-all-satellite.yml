name: Reprocess All Satellite Data

# Auto-triggered when either processing script changes (e.g. methodology update).
# Also available for manual dispatch.
on:
  push:
    paths:
      - 'scripts/gee/process-monthly.py'
      - 'scripts/gee/process-yearly.py'
  workflow_dispatch:

jobs:
  # ── Step 1: read index.json from R2 to get all processed periods ──────────
  get-periods:
    name: Fetch period list from R2 index
    runs-on: ubuntu-latest
    outputs:
      monthly: ${{ steps.parse.outputs.monthly }}
      yearly:  ${{ steps.parse.outputs.yearly }}

    steps:
      - name: Fetch index.json and parse period lists
        id: parse
        env:
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          SATELLITE_CACHE_PREFIX: ${{ vars.SATELLITE_CACHE_PREFIX || 'satellite-cache' }}
        run: |
          INDEX=$(curl -sf "${R2_PUBLIC_BASE_URL}/${SATELLITE_CACHE_PREFIX}/index.json" \
                  || echo '{"monthly":[],"yearly":[]}')
          MONTHLY=$(echo "$INDEX" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(json.dumps(d.get("monthly",[])))')
          YEARLY=$(echo "$INDEX"  | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(json.dumps(d.get("yearly", [])))')
          echo "monthly=$MONTHLY" >> "$GITHUB_OUTPUT"
          echo "yearly=$YEARLY"   >> "$GITHUB_OUTPUT"
          echo "Found monthly periods: $MONTHLY"
          echo "Found yearly periods:  $YEARLY"

  # ── Step 2a: reprocess all monthly periods in parallel ────────────────────
  reprocess-monthly:
    name: Monthly ${{ matrix.period }}
    needs: get-periods
    if: ${{ needs.get-periods.outputs.monthly != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        period: ${{ fromJson(needs.get-periods.outputs.monthly) }}
      max-parallel: 4
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/gee/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/gee/requirements.txt

      - name: Reprocess ${{ matrix.period }}
        env:
          GEE_SERVICE_ACCOUNT_JSON: ${{ secrets.GEE_SERVICE_ACCOUNT_JSON }}
          R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:                ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:       ${{ secrets.R2_PUBLIC_BASE_URL }}
          SATELLITE_CACHE_PREFIX:   ${{ vars.SATELLITE_CACHE_PREFIX || 'satellite-cache' }}
        run: python scripts/gee/process-monthly.py --period ${{ matrix.period }} --force

  # ── Step 2b: reprocess all yearly periods in parallel ─────────────────────
  reprocess-yearly:
    name: Yearly ${{ matrix.year }}
    needs: get-periods
    if: ${{ needs.get-periods.outputs.yearly != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        year: ${{ fromJson(needs.get-periods.outputs.yearly) }}
      max-parallel: 4
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/gee/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/gee/requirements.txt

      - name: Reprocess ${{ matrix.year }}
        env:
          GEE_SERVICE_ACCOUNT_JSON: ${{ secrets.GEE_SERVICE_ACCOUNT_JSON }}
          R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:                ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:       ${{ secrets.R2_PUBLIC_BASE_URL }}
          SATELLITE_CACHE_PREFIX:   ${{ vars.SATELLITE_CACHE_PREFIX || 'satellite-cache' }}
        run: python scripts/gee/process-yearly.py --year ${{ matrix.year }} --force
