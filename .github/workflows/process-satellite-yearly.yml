name: Process Yearly Satellite Data

# Runs on January 15th each year to process the previous full calendar year.
# Can also be triggered manually to process any specific year.

on:
  schedule:
    # Jan 15 at 23:00 UTC = Jan 16 at 06:00 Bangkok (UTC+7)
    - cron: '0 23 15 1 *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Target year YYYY (leave blank for previous year)'
        required: false
        default: ''
      force_reprocess:
        description: 'Force reprocess even if metadata already exists (true/false)'
        required: false
        default: 'false'

jobs:
  process:
    name: Compute yearly composite and upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/gee/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/gee/requirements.txt

      - name: Build run arguments
        id: args
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="$ARGS --year ${{ github.event.inputs.year }}"
          fi
          if [ "${{ github.event.inputs.force_reprocess }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run yearly composite processing
        env:
          GEE_SERVICE_ACCOUNT_JSON: ${{ secrets.GEE_SERVICE_ACCOUNT_JSON }}
          R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:                ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:       ${{ secrets.R2_PUBLIC_BASE_URL }}
          SATELLITE_CACHE_PREFIX:   ${{ vars.SATELLITE_CACHE_PREFIX || 'satellite-cache' }}
          FORCE_REPROCESS:          ${{ github.event.inputs.force_reprocess || 'false' }}
        run: python scripts/gee/process-yearly.py ${{ steps.args.outputs.args }}
